name: Build dist.zip

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package dist.zip
        run: zip -r ../dist.zip .
        working-directory: dist

      - name: Upload dist.zip
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist.zip
          if-no-files-found: error
