<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Dashboard</title>
  <link rel="stylesheet" href="src/ui/common.css" />
  <link rel="stylesheet" href="src/ui/dashboard.css" />
</head>
<body>
  <main class="dashboard-shell">
    <header class="dashboard-header">
      <div>
        <p class="eyebrow">Protect your time. Protect your focus.</p>
        <h1>Focus dashboard</h1>
        <p class="lede">A calmer reading of where attention is going, what broke it, and what to adjust next.</p>
        <p id="dashboardStatus" class="micro-copy">Loading focus data...</p>
      </div>
      <div class="header-actions">
        <button class="button primary" data-refresh-dashboard="true" type="button">Refresh</button>
      </div>
    </header>

    <nav class="dashboard-tabs" id="dashboardTabs"></nav>
    <section id="dashboardContent" class="dashboard-content"></section>
  </main>

  <script type="module" src="src/ui/dashboard.js"></script>
</body>
</html>
